#User defined
user:
  backend_ws:
    label:
      Laravel version
    hint:
      Select a Laravel version
    type:
      select
    values:
      - 6
      - 7
      - 8
    target:
      LARAVEL_VERSION

#System defaults
system:
  show_localpath_selector:
    true
  #For collecting and storing DB in .env
  #db/user/password
  db_credentials:
    true
  #Generate public ports for the docker image
  ports:
    http: LARAVEL_HTTP_PORT
    others:
      - MYSQL_PORT